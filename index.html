<!DOCTYPE html>
<html>
<head>
  <title>Word Party 🎉</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Word Party 🎉</h1>
<audio id="correctSound" src="./correct.mp3"></audio>
<audio id="tickSound" src="./tick.mp3"></audio>

<!-- LOBBY -->
<div id="lobby">
  <input id="nameInput" placeholder="Your Name">
  <input id="roomInput" placeholder="Room Code">
  <button onclick="createRoom()">Create Room</button>
  <button onclick="joinRoom()">Join Room</button>
  <button onclick="toggleSound()">Toggle Sound 🔊</button>
</div>

<!-- ROOM -->
<div id="room" style="display:none;">
  <h2>Room: <span id="roomCode"></span></h2>
  <p id="playerList"></p>

  <button id="submissionBtn" onclick="startSubmission()">Start Submissions</button>

</div>

<!-- SUBMISSION -->
<div id="submission" style="display:none;">
  <h2>Enter 3 Words</h2>
  <input id="word1" placeholder="Word 1">
  <input id="hint1" placeholder="Hint 1">
  <input id="word2" placeholder="Word 2">
  <input id="hint2" placeholder="Hint 2">
  <input id="word3" placeholder="Word 3">
  <input id="hint3" placeholder="Hint 3">
  <p id="submissionStatus"></p>
  <button onclick="submitWords()">Submit Words</button>
    <button id="startBtn" onclick="startGame()">Start Game ▶️</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <h2 id="scrambledWord"></h2>

  <button onclick="skipWord()">Skip</button>

  <input id="guessInput" placeholder="Your guess">
  <button onclick="submitGuess()">Guess</button>

  <button onclick="useHint()">Hint</button>
  <button onclick="rescramble()">Rescramble</button>

  <div id="liveScores"></div>
  <p id="hint"></p>

  <h3 id="timer"></h3>
</div>

<!-- SCOREBOARD -->
<div id="scoreboard" style="display:none;">
  <h2>Scores</h2>
  <div id="scores"></div>
  <button onclick="replayGame()">Play Again 🔁</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
